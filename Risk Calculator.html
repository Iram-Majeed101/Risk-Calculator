<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD Risk Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body background="url('images/trading-bg.jpg');">

<div class="card">
    <h2>XAUUSD Risk Calculator</h2>

    <label>Account Balance ($)</label>
    <input type="number" id="balance" value="1300">

    <label>Risk Percentage (%)</label>
    <input type="number" id="risk" value="1">

    <label>Stop Loss (Points)</label>
    <input type="number" id="sl" value="13">

    <label>Take Profit (Points)</label>
    <input type="number" id="tp" value="25">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculate() {

    let balance = parseFloat(document.getElementById("balance").value);
    let riskPercent = parseFloat(document.getElementById("risk").value);
    let sl = parseFloat(document.getElementById("sl").value);
    let tp = parseFloat(document.getElementById("tp").value);

    let riskAmount = balance * riskPercent / 100;

    // Your cent-account formula:
    let lotSize = riskAmount / sl;

    let profit = lotSize * tp;
    let rr = (tp / sl).toFixed(2);

    let output = `
═══════════════════════════════
      TRADE RISK DETAILS
═══════════════════════════════

💰 Account Balance: $${balance.toFixed(2)}
🪙 Balance in Cents: ${(balance*100).toLocaleString()} cents

📦 Lot Size: ${lotSize.toFixed(2)} cent lot

📏 Stop Loss: ${sl} points
📏 Take Profit: ${tp} points

⚠️ Risk Percentage: ${riskPercent.toFixed(2)}%
📉 Stop Loss Risk: $${riskAmount.toFixed(2)} Loss

🎯 Take Profit Reward: $${profit.toFixed(2)} Profit
📊 Risk : Reward Ratio: 1 : ${rr}

═══════════════════════════════
`;

    document.getElementById("output").innerHTML = `
═══════════════════════════════<br>
&nbsp;&nbsp;&nbsp;&nbsp;TRADE RISK DETAILS<br>
═══════════════════════════════<br><br>

💰 Account Balance: $${balance.toFixed(2)}<br>
🪙 Balance in Cents: ${(balance*100).toLocaleString()} cents<br>

📦 Lot Size:
<span class="lot-highlight">
${lotSize.toFixed(2)} cent lot
</span><br><br>

📏 Stop Loss: ${sl} points<br>
📏 Take Profit: ${tp} points<br>

⚠️ Risk Percentage: ${riskPercent.toFixed(2)}%<br>

📉 Stop Loss Risk:
<span class="loss-highlight">
$${riskAmount.toFixed(2)} Loss
</span><br>

🎯 Take Profit Reward:
<span class="profit-highlight">
$${profit.toFixed(2)} Profit
</span><br>

📊 Risk : Reward Ratio: 1 : ${rr}<br>

═══════════════════════════════
`;
}
</script>

</body>
</html>
